models:
  - id: claude-sonnet
    provider: anthropic
    model: claude-sonnet-4-5
    apiKey: ${ANTHROPIC_API_KEY}
    baseUrl: https://api.anthropic.com
    maxTokens: 8192
    rateLimit:
      requestsPerMinute: 50
      tokensPerMinute: 400000
    roles: [developer, reviewer, tester, debugger, docs]
    costPer1kInput: 0.003
    costPer1kOutput: 0.015

  - id: claude-opus
    provider: anthropic
    model: claude-opus-4-5
    apiKey: ${ANTHROPIC_API_KEY}
    maxTokens: 4096
    rateLimit:
      requestsPerMinute: 20
      tokensPerMinute: 100000
    roles: [team-lead, architect]
    costPer1kInput: 0.015
    costPer1kOutput: 0.075

  # Uncomment to add OpenAI support
  # - id: gpt4o
  #   provider: openai
  #   model: gpt-4o
  #   apiKey: ${OPENAI_API_KEY}
  #   roles: [developer, tester]
  #   costPer1kInput: 0.005
  #   costPer1kOutput: 0.015

  # Uncomment to add Google Gemini support
  # - id: gemini-flash
  #   provider: google
  #   model: gemini-2.0-flash
  #   apiKey: ${GOOGLE_API_KEY}
  #   roles: [developer, docs]
  #   costPer1kInput: 0.0001
  #   costPer1kOutput: 0.0004

  # Local Ollama model (free — no API key required)
  # Use port 11434 (raw Ollama API), NOT the Open WebUI port (typically 8080/3000).
  # Run `ollama list` on the host to see available models.
  # Qwen3.x uses thinking-mode internally; token counts look inflated but it is
  # harmless since local models cost $0.
  - id: local-qwen
    provider: local
    baseUrl: http://localhost:11434   # or http://<LAN-IP>:11434 for a remote machine
    model: qwen3.5:27b
    maxTokens: 8192
    rateLimit:
      requestsPerMinute: 10
      tokensPerMinute: 50000
    roles: [developer, reviewer, tester]
    costPer1kInput: 0
    costPer1kOutput: 0

claudeCode:
  enabled: false          # Set to true if Claude Code CLI is installed
  binaryPath: claude
  maxConcurrentSessions: 1
  usageLimitCooldownMinutes: 60
  timeoutMinutes: 10
  reserveForRoles: [debugger, architect]

defaults:
  temperature: 0.2
  retryAttempts: 3
  retryBackoffMs: 1000
  maxConcurrentAgents: 5
  maxToolCallsPerTurn: 50
  contextSummarizeEveryNTurns: 20

budget:
  maxTotalCost: 50.00
  warnAtCost: 40.00
  maxWallClockHours: 8
